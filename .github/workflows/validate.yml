name: Validate reference package

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node validation dependencies
        run: npm ci

      - name: Validate schemas, examples, and sanitization
        run: npm run validate

      - name: Lint Markdown
        run: npm run lint:markdown

      - name: Validate Mermaid diagrams
        run: npm run lint:mermaid

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --accept 200,206,429 README.md THREAT_MODEL.md PUBLISH_CHECKLIST.md LICENSE_OPTIONS.md examples/**/*.md
          fail: true
